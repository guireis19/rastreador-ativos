<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reis Tech - Rastreador</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="container mx-auto px-4 py-10">
        <h1 class="text-4xl font-bold text-center text-blue-500 mb-10">Rastreador de Ativos Reis Tech</h1>

        <!-- Formulário -->
        <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-lg shadow-lg mb-10">
            <form method="POST" class="flex gap-2">
                <input type="text" name="ticker" placeholder="Ex: PETR4.SA" 
                       class="flex-1 p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-bold transition">Consultar</button>
            </form>
        </div>

        <!-- Tabela -->
        <div class="overflow-x-auto">
            <table class="w-full text-left bg-gray-800 rounded-lg overflow-hidden shadow-xl">
                <thead class="bg-gray-700 text-blue-400">
                    <tr>
                        <th class="p-4">ID</th>
                        <th class="p-4">Ticker</th>
                        <th class="p-4">Preço</th>
                        <th class="p-4">Data/Hora</th>
                    </tr>
                </thead>
                <tbody>
                    {% for registro in historico %}
                    <tr class="border-t border-gray-700 hover:bg-gray-750 transition">
                        <td class="p-4">{{ registro.id }}</td>
                        <td class="p-4 font-bold">{{ registro.ticker }}</td>
                        <td class="p-4">R$ {{ "%.2f"|format(registro.preco) }}</td>
                        <td class="p-4 text-gray-400 text-sm">{{ registro.data_consulta.strftime('%d/%m/%Y %H:%M') }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
